<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Feed Sign Up</title>

    <style>
        * {
            margin: 0;
        }
        * {
            box-sizing: border-box;
        }

        body {
            background: rgb(120, 96, 64);
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
        }
        #formContainer{
            width: min(450px, 92vw);
            background: #ffffff;
            border: 12px solid #0e3b87; 
            border-radius: 32px;
            overflow: hidden;
            position: relative;
        }
        
        .headerImage img{
            width: 100%;
            height: 200px;
            object-fit: cover;
            object-position: top;
            display: block;
            line-height: 0;
        }
          
        #formContainer h2{
            position: absolute;
            top: 100px;               
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 40px;
            text-align: center;
            padding-top: 60px;
            width: 90%;
            text-shadow: 2px 2px 8px rgba(0,0,0,1);
        }

        #closeBtn{
            position: absolute;
            top: 16px;
            left: 16px;
            z-index: 10;
            background: white;
            border: 1px solid #999;
            border-radius: 4px;
            padding: 4px 8px;
            cursor: pointer;
        }
        #formContainer h3{
        text-align: center;
        padding: 20px 0 20px 0;
        font-size: 22px;
        }
        #myForm{
            display: grid;
            grid-template-columns: 1fr 1fr;
            row-gap: 20px;
            column-gap: 16px;
            padding: 0 30px 30px 30px;
            align-items: center;
        }
        #myForm > section{
            grid-column: 1 / 3;   
            display: flex;
            justify-content: center;  
            align-items: center;
            gap: 8px;
        }

        #myForm > section:last-child{
            justify-content: center;
        }
        
        .bookStrip{
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 5px;
           
            background: #fff;
        }
        .bookStrip img{
            width: 100%;
            height: 110px;
            object-fit: cover;
           
        }
        
    </style>




</head>

<body>
    <div id="formContainer">
        <div class="headerImage">
            <img src="images/jesus_feeds_5000.jpeg" alt="Daily Feed Header">
        </div>
        <h2>Daily Feed<br>Scripture a Day</h2>
        <h3>Sign Up for Daily Scripture Feed</h3>
        <form id="myForm">
            <button type="button" id="closeBtn">X</button>
            <label for="username">User Name:</label>
            <input type="text" id="username" name="username" required>

            <label for="password">Password:</label>
            <input type="password" id="password" name="password" required>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>

            <label>Gender:</label>
            <div>
                <input type="radio" id="male" name="gender" value="male" required>
                <label for="male">Male</label>
                <input type="radio" id="female" name="gender" value="female" required>
                <label for="female">Female</label>
            </div>

            <section>
                <input type="checkbox" id="newsletter" name="newsletter">
                <label for="newsletter">Subscribe to newsletter</label>
            </section>

            <section>
                <input type="checkbox" id="conditions" name="conditions" required>
                <label for="conditions">I acknowledge the terms and conditions</label>
            </section>

            <section>
                <button type="submit">Submit</button>
            </section>
        </form>

        <div class="bookStrip">
            <img src="images/book_of_mormon.webp" alt="book1">
            <img src="images/old_testament.webp" alt="book2">
            <img src="images/pearl_of_great_price.webp" alt="book3">
            <img src="images/new_testament.webp" alt="book4">
            <img src="images/doctrine_and_covenants.webp" alt="book5">
        </div>

    </div>

    <div id="output"></div>

    <script>
        // Here is some Javascript to start looking forward to wdd131
        document.getElementById("closeBtn").addEventListener("click", function () {
            document.getElementById("formContainer").style.display = "none";
         });
        const form = document.getElementById('myForm');
        const output = document.getElementById('output');

        form.addEventListener('submit', function (event) {
            event.preventDefault(); // Stop form from actually submitting

            const formData = new FormData(form);
            const entries = [];

            for (const [key, value] of formData.entries()) {
                if (key == "password") {
                    entries.push(`<strong>${key}</strong>: ${value} (you should probably encrypt the password)`);
                } else {
                    entries.push(`<strong>${key}</strong>: ${value}`);
                }
            }

            output.innerHTML = `
            <br>  
            <h3>Here is the data that would be sent to the server:</h3>
            <ul>
                ${entries.map(item => `<li>${item}</li>`).join('')}
            </ul>
            `;
                });
    </script>

</body>

</html>
