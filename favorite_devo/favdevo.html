<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Favorite Devotionals</title>
  <link rel="stylesheet" href="styles/styles.css" />
</head>
<body>
  <div class="container">
    <header class="header">
      <div class="header-image">
        <h1>My Favorite<br>Devotionals</h1>
      </div>
    </header>
    <main>
      <div class="content-box">
        <h2>Favorite Devotionals</h2>

  <!-- Devotional Table -->
  <table class="devotional-table">
    <thead>
      <tr>
        <th>Speaker</th>
        <th>Title</th>
        <th>Location</th>
        <th>Year</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td>Jennifer Platt</td>
        <td>Washing Their Nets</td>
        <td>BYU–Idaho</td>
        <td>2026</td>
      </tr>
      <tr>
        <td>President Alvin F. Meredith III</td>
        <td>Go and Do Thou Likewise</td>
        <td>BYU–Idaho</td>
        <td>2026</td>
      </tr>
      <tr>
        <td>Sister Jennifer E. Meredith</td>
        <td>The Majesty of Your Moment</td>
        <td>BYU–Idaho</td>
        <td>2026</td>
      </tr>
    </tbody>
  </table>

  <!-- Form -->
  <h2>Add a New Devotional</h2>
  <form class="devotional-form">
    <div class="form-group">
      <label for="speaker">Speaker</label>
      <input type="text" id="speaker" name="speaker" placeholder="Enter speaker name">
    </div>

    <div class="form-group">
      <label for="title">Title</label>
      <input type="text" id="title" name="title" placeholder="Enter devotional title">
    </div>

    <div class="form-group">
      <label for="location">Location</label>
      <input type="text" id="location" name="location" placeholder="Enter location">
    </div>

    <div class="form-group">
      <label for="year">Year</label>
      <input type="number" id="year" name="year" placeholder="Enter year">
    </div>

    <button type="submit">Add Devotional</button>
  </form>
        
      </div>
    </main>
  </div>
</body>
</html>
